palette_variants: [species_blob_pink, species_blob_mint, species_blob_yellow, species_blob_blue, species_blob_purple]
size: 32x32
upscale: 3
frames: 6
durations_ms: [320, 180, 280, 320, 200, 320]
# Big-idle yawn — mouth opens wide, eyes squeeze shut, body lifts. Six
# frames over ~1.6 s. Ends back on a rest pose so the renderer can fall
# straight back into the mood loop.
frames_shape:
  # Frame 0 — rest (matches idle frame 0)
  - - oval:  {pos: [4, 9], size: [24, 20], color: light}
    - oval:  {pos: [4, 25], size: [24, 4], color: shadow}
    - oval:  {pos: [10, 11], size: [12, 5], color: highlight}
    - oval:  {pos: [3, 17], size: [4, 3], color: cheek}
    - oval:  {pos: [25, 17], size: [4, 3], color: cheek}
    - oval:  {pos: [10, 14], size: [3, 4], color: eye}
    - oval:  {pos: [19, 14], size: [3, 4], color: eye}
    - rect:  {pos: [14, 21], size: [4, 1], color: eye}
    - pixel: {pos: [11, 14], color: highlight}
    - pixel: {pos: [20, 14], color: highlight}

  # Frame 1 — opening (mouth widens, eyes start to squint)
  - - oval:  {pos: [4, 8], size: [24, 21], color: light}
    - oval:  {pos: [4, 25], size: [24, 4], color: shadow}
    - oval:  {pos: [10, 10], size: [12, 5], color: highlight}
    - oval:  {pos: [3, 17], size: [4, 3], color: cheek}
    - oval:  {pos: [25, 17], size: [4, 3], color: cheek}
    # Eyes squinting (height 3 -> 2)
    - oval:  {pos: [10, 14], size: [3, 3], color: eye}
    - oval:  {pos: [19, 14], size: [3, 3], color: eye}
    # Mouth opening (4x1 -> 5x2)
    - oval:  {pos: [13, 20], size: [6, 3], color: eye}

  # Frame 2 — yawn peak (body taller, mouth wide oval, eyes closed lines)
  - - oval:  {pos: [4, 5], size: [24, 24], color: light}
    - oval:  {pos: [4, 25], size: [24, 4], color: shadow}
    - oval:  {pos: [10, 7], size: [12, 5], color: highlight}
    - oval:  {pos: [3, 14], size: [4, 3], color: cheek}
    - oval:  {pos: [25, 14], size: [4, 3], color: cheek}
    # Closed eye lines
    - rect:  {pos: [9, 11], size: [4, 1], color: eye}
    - rect:  {pos: [19, 11], size: [4, 1], color: eye}
    # Wide-open round mouth
    - oval:  {pos: [12, 17], size: [8, 8], color: eye}
    - oval:  {pos: [13, 18], size: [6, 5], color: cheek}

  # Frame 3 — peak hold (same body, slightly different highlight)
  - - oval:  {pos: [4, 5], size: [24, 24], color: light}
    - oval:  {pos: [4, 25], size: [24, 4], color: shadow}
    - oval:  {pos: [10, 7], size: [12, 6], color: highlight}
    - oval:  {pos: [3, 14], size: [4, 3], color: cheek}
    - oval:  {pos: [25, 14], size: [4, 3], color: cheek}
    - rect:  {pos: [9, 11], size: [4, 1], color: eye}
    - rect:  {pos: [19, 11], size: [4, 1], color: eye}
    - oval:  {pos: [12, 17], size: [8, 8], color: eye}
    - oval:  {pos: [13, 18], size: [6, 5], color: cheek}

  # Frame 4 — closing (body coming back down, mouth shrinking)
  - - oval:  {pos: [4, 8], size: [24, 21], color: light}
    - oval:  {pos: [4, 25], size: [24, 4], color: shadow}
    - oval:  {pos: [10, 10], size: [12, 5], color: highlight}
    - oval:  {pos: [3, 16], size: [4, 3], color: cheek}
    - oval:  {pos: [25, 16], size: [4, 3], color: cheek}
    # Eyes opening (still small)
    - oval:  {pos: [10, 13], size: [3, 3], color: eye}
    - oval:  {pos: [19, 13], size: [3, 3], color: eye}
    # Mouth almost closed
    - oval:  {pos: [13, 20], size: [6, 2], color: eye}

  # Frame 5 — settle (same as rest, slight smile to bridge back)
  - - oval:  {pos: [4, 9], size: [24, 20], color: light}
    - oval:  {pos: [4, 25], size: [24, 4], color: shadow}
    - oval:  {pos: [10, 11], size: [12, 5], color: highlight}
    - oval:  {pos: [3, 17], size: [4, 3], color: cheek}
    - oval:  {pos: [25, 17], size: [4, 3], color: cheek}
    - oval:  {pos: [10, 14], size: [3, 4], color: eye}
    - oval:  {pos: [19, 14], size: [3, 4], color: eye}
    - rect:  {pos: [13, 21], size: [6, 1], color: eye}
    - pixel: {pos: [11, 14], color: highlight}
    - pixel: {pos: [20, 14], color: highlight}
